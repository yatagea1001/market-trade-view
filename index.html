<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Market Trade View</title>

<style>
/* --- 1. RESET STANDAR BROWSER --- */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow: hidden; /* Anti Scroll */
    background-color: #000;
    font-family: 'Segoe UI', sans-serif;
    /* 🔥 PENTING: Matikan semua gesture bawaan browser (zoom/swipe back) */
    touch-action: none; 
    -webkit-user-select: none; /* Matikan blok teks */
    user-select: none;
}

/* --- 2. CANVAS STANDAR IMGUI WEB --- */
canvas.emscripten {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0 none;
    background-color: #000;
    outline: none;
    /* 🔥 Hilangkan highlight biru saat tap di Android */
    -webkit-tap-highlight-color: transparent; 
    /* ✅ HAPUS fade-in 2 detik — UI langsung muncul saat WASM ready (native feel).
       Sebelumnya: opacity: 0; transition: opacity 2s ease;
       Masalah: selama 2 detik fade-in, mouse event sudah aktif tapi ImGui
       context belum ready → crash "GImGui != 0L". */
    opacity: 1;
}

/* --- 👻 CLASS HANTU (RAHASIA TEMBUS PANDANG) --- */
/* Pakai class ini di div overlay (judul, fps, watermark) */
.overlay-ghost {
    pointer-events: none !important; /* Tembus sentuhan! */
}
/* Pakai class ini di TOMBOL HTML (Chat, Login) biar bisa diklik */
.overlay-interactive {
    pointer-events: auto !important; 
    cursor: pointer;
}

/* --- UI LOGIN (GATEWAY) --- */
#login-gateway {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9999; display: flex; overflow: hidden; 
    pointer-events: none; /* Container login tembus pandang */
}
/* Anak elemen login harus bisa diklik */
#login-gateway > * { pointer-events: auto; }

.gate {
    position: absolute; width: 50%; height: 100%;
    background: #111; border: 1px solid #222;
    transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
}
.gate-left { left: 0; border-right: 2px solid #0af; }
.gate-right { right: 0; border-left: 2px solid #0af; }

.gate-open .gate-left { transform: translateX(-100%); }
.gate-open .gate-right { transform: translateX(100%); }

#auth-container {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000; background: rgba(26, 26, 26, 0.95);
    padding: 40px; border-radius: 12px;
    width: 320px; border: 1px solid #333;
    color: white; text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.auth-fade-out { opacity: 0; transform: translate(-50%, -60%); pointer-events: none; }

h2 { margin-bottom: 25px; color: #0af; letter-spacing: 2px; font-size: 20px; }
input {
    width: 100%; padding: 12px; margin: 10px 0;
    background: #111; border: 1px solid #444; border-radius: 6px; color: white;
}
input:focus { border-color: #0af; outline: none; }
button {
    width: 100%; padding: 14px; margin-top: 15px;
    background: #0af; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
}
button:hover { background: #008ccb; }
.toggle-link { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; }
#auth-msg { color: #ff5555; font-size: 12px; margin-top: 10px; min-height: 15px; }

</style>
</head>

<body>
<div id="loading-spinner" style="
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #0af; font-family: sans-serif; font-size: 14px; z-index: 1; pointer-events: none;">
</div>
<div id="login-gateway" style="display:none;">
    <div class="gate gate-left"></div>
    <div class="gate gate-right"></div>
    <div id="auth-container">
        <h2 id="form-title">MY PROJECT TRADER</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()" id="btn-auth">MASUK</button>
        <p id="auth-msg"></p>
        <div class="toggle-link" id="toggle-text" onclick="toggleMode()">Belum punya akun? Daftar di sini</div>
    </div>
</div>

<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<script>
    var Module = {
        locateFile: function(path, prefix) {
            if (path.endsWith('.data') || path.endsWith('.wasm')) return 'dist/' + path;
            return prefix + path;
        },
        preRun: [],
        postRun: [],
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. Reload page.'); e.preventDefault(); }, false);
            return canvas;
        })(),
       onRuntimeInitialized: function() { 
        console.log("[WASM] Engine Loaded.");
        var spinner = document.getElementById('loading-spinner');
        if(spinner) spinner.style.display = 'none';

        // 🔥 GUEST MODE: Langsung masuk tanpa login
        var gateway = document.getElementById('login-gateway');
        if (gateway) gateway.style.display = 'none';
        var cv = document.getElementById('canvas');
        // ✅ HAPUS cv.style.opacity = '1' — opacity sudah 1 dari CSS (no fade-in)
        if (cv) { cv.focus(); }

        if (Module._wasm_on_login_success) Module._wasm_on_login_success();
        if (typeof connectWS === 'function') connectWS();
    }
};
    window.onerror = function(event) { console.error("Window Error: " + event); };
</script>

<script>
    // --- LOGIKA LOGIN (SAMA SEPERTI SEBELUMNYA) ---
    let isRegisterMode = false;
    function toggleMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById("form-title").innerText = isRegisterMode ? "BUAT AKUN" : "SELAMAT DATANG DI PROJECK YATA";
        document.getElementById("btn-auth").innerText = isRegisterMode ? "DAFTAR SEKARANG" : "LOGIN";
        document.getElementById("toggle-text").innerText = isRegisterMode ? "Kembali ke Login" : "Belum punya akun? Daftar sini";
        document.getElementById("auth-msg").innerText = "";
    }

    async function handleAuth() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        const endpoint = isRegisterMode ? "register" : "login";
        const msgBox = document.getElementById("auth-msg");

        if(!email || !pass) { msgBox.innerText = "Please fill all fields"; return; }

        try {
              const response = await fetch(`/api/${endpoint}`, {
           //const response = await fetch(`http://127.0.0.1:5001/api/${endpoint}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, password: pass })
            });
            const data = await response.json();

            if (data.status === "success") {
                if (isRegisterMode) {
                    alert("Registration Successful!"); toggleMode();
                } else {
                    document.getElementById("auth-container").classList.add("auth-fade-out");
                    setTimeout(() => {
                        document.getElementById("login-gateway").classList.add("gate-open");
                        document.getElementById("canvas").style.opacity = "1"; 
                        document.getElementById("canvas").focus();
                    }, 500);

                    setTimeout(() => {
                        if (Module._wasm_on_login_success) Module._wasm_on_login_success();
                        if (typeof connectWS === 'function') connectWS();
                        setTimeout(() => document.getElementById("login-gateway").remove(), 2000);
                    }, 1000);
                }
            } else { msgBox.innerText = data.message; }
        } catch (error) { msgBox.innerText = "Connection Gagal"; console.error(error); }
    }

    // --- BRIDGE WASM ---
    window.notifyWASM_candle = function(o,h,l,c,t,v){
        if (Module.ccall) Module.ccall("wasm_push_candle", null, ["number","number","number","number","number","number"], [o,h,l,c,t,v]);
    };
    window.notifyWASM_tick = function(price,time){
        if (Module.ccall) Module.ccall("wasm_push_tick", null, ["number","number"], [price,time]);
    };
    
    // ====================================================================
    // 🖱️ & 📱 SUPER NATIVE INPUT HANDLING (JARI = MOUSE)
    // ====================================================================
    var canvas = document.getElementById("canvas");
    var isTouching = false; 
    var lastTouchX = null, lastTouchY = null, lastPinchDist = null;

    function getScale() {
        var rect = canvas.getBoundingClientRect();
        return { x: canvas.width / rect.width, y: canvas.height / rect.height };
    }
    function getPinchDist(t1, t2) {
        return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }

    // 🛡️ GUARD: cek apakah WASM benar-benar siap terima input.
    // Module.ccall ada SEBELUM main() selesai, jadi cek Module.calledRun
    // untuk pastikan main() sudah jalan (ImGui::CreateContext() sudah call).
    // Tanpa ini, mouse event masuk sebelum ImGui context ready → crash.
    function wasmInputReady() {
        return (typeof Module !== 'undefined' &&
                Module.ccall &&
                Module.calledRun === true);
    }

    // --- 1. MOUSE (PC) ---
    // Kita cegat Mouse Event jika user sedang pakai Touchscreen (supaya tidak double click)
    canvas.addEventListener('mousemove', function(e) {
        if (isTouching) return; 
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        var rect = canvas.getBoundingClientRect(); var s = getScale();
        Module.ccall('wasm_mouse_move', null, ['number', 'number'], [(e.clientX - rect.left)*s.x, (e.clientY - rect.top)*s.y]);
    });
    canvas.addEventListener('mousedown', function(e) {
        if (isTouching) { e.preventDefault(); return; } // 🔥 Stop Ghost Click
        if (!wasmInputReady()) { e.preventDefault(); return; }  // 🛡️ skip kalau WASM belum siap
        Module.ccall('wasm_mouse_click', null, ['number', 'number'], [e.button, 1]); 
    }, {passive: false});
    canvas.addEventListener('mouseup', function(e) {
        if (isTouching) { e.preventDefault(); return; } // 🔥 Stop Ghost Click
        if (!wasmInputReady()) { e.preventDefault(); return; }  // 🛡️ skip kalau WASM belum siap
        Module.ccall('wasm_mouse_click', null, ['number', 'number'], [e.button, 0]); 
    }, {passive: false});
    canvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        Module.ccall('wasm_mouse_wheel', null, ['number'], [Math.sign(e.deltaY) * -1]);
    }, {passive: false});
    canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);

    // --- 2. TOUCH (JARI -> MOUSE SIMULATOR) ---
    // Ini rahasianya agar drawing berfungsi saat disentuh
    
    canvas.addEventListener('touchstart', function(e) {
        if(e.cancelable) e.preventDefault(); // 🔥 Matikan scroll/zoom browser
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        isTouching = true;
        
        var rect = canvas.getBoundingClientRect(); var s = getScale();

        if (e.touches.length === 1) {
            // SINGLE TOUCH (Simulasi Mouse Kiri Klik)
            var touch = e.touches[0];
            var x = (touch.clientX - rect.left) * s.x;
            var y = (touch.clientY - rect.top) * s.y;
            
            lastTouchX = touch.clientX; lastTouchY = touch.clientY; lastPinchDist = null;

            // 🔥 LANGKAH 1: Teleport Kursor Mouse Virtual ke posisi jari DULUAN
            Module.ccall('wasm_mouse_move', null, ['number', 'number'], [x, y]);
            // 🔥 LANGKAH 2: Baru tekan tombol "Klik Kiri" (1 = Down)
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 1]); 
            
            // Opsional: Kirim raw touch start buat logic lain
            Module.ccall('wasm_notify_touch_start', null, ['number', 'number'], [x, y]);
        } else if (e.touches.length === 2) {
            // DUAL TOUCH (Zoom / Pan - Lepas Klik Mouse)
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 0]);
            lastPinchDist = getPinchDist(e.touches[0], e.touches[1]);
            lastTouchX = null; lastTouchY = null;
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', function(e) {
        if (e.cancelable) e.preventDefault(); 
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        var rect = canvas.getBoundingClientRect(); var s = getScale();

        if (e.touches.length === 2 && lastPinchDist !== null) {
            // --- ZOOM LOGIC ---
            var currentDist = getPinchDist(e.touches[0], e.touches[1]);
            var deltaZoom = (currentDist - lastPinchDist) * s.x;
            Module.ccall('wasm_zoom_chart', null, ['number'], [deltaZoom]);
            lastPinchDist = currentDist; 
        } 
        else if (e.touches.length === 1 && lastTouchX !== null) {
            // --- DRAG / DRAW LOGIC ---
            var touch = e.touches[0];
            var x = (touch.clientX - rect.left) * s.x;
            var y = (touch.clientY - rect.top) * s.y;
            
            // Hitung delta untuk Pan Chart
            var deltaX = touch.clientX - lastTouchX; 
            var deltaY = touch.clientY - lastTouchY;

            // 1. Update posisi mouse virtual (PENTING BUAT DRAWING TOOLS)
            Module.ccall('wasm_mouse_move', null, ['number', 'number'], [x, y]);
            
            // 2. Kirim sinyal Pan (Geser Chart) 
            // Catatan: Di main.cpp, pastikan logika "Jika sedang Drawing, Jangan Pan Chart"
            Module.ccall('wasm_pan_chart_pixels', null, ['number', 'number'], [deltaX, deltaY]);
            lastTouchX = touch.clientX; lastTouchY = touch.clientY;
        }
    }, {passive: false});

    canvas.addEventListener('touchend', function(e) {
        if (e.cancelable) e.preventDefault();
        if (!wasmInputReady()) { isTouching = false; return; }  // 🛡️ skip kalau WASM belum siap
        
        if (e.touches.length < 2) lastPinchDist = null;
        
        if (e.touches.length === 0) { 
            lastTouchX = null; lastTouchY = null;

            // 🔥 FIX: Langsung reset semua state touch di C++ tanpa delay
            // Dulu pakai setTimeout 300ms → g_isTouchActive nyangkut di true
            // Sekarang langsung reset → scale Y tidak "ingat" state lama
            // Reset klik mouse
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 0]);
            // Reset semua touch state (g_isTouchActive, isResizingY, deltas, dll)
            Module.ccall('wasm_notify_touch_end', null, [], []);

            // Reset flag JS juga langsung (tanpa delay)
            isTouching = false;
        } else {
            // Masih ada jari lain di layar → cukup lepas mouse click
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 0]);
        }
    }, {passive: false});

   // --- KEYBOARD HANDLING ---
    // FIX: Jika user sedang ngetik di HTML input/textarea (misal: jarvis chat),
    // JANGAN kirim key ke ImGui dan JANGAN preventDefault.
    // Biarkan key event sampai ke HTML input secara normal.
    function isHtmlInputFocused() {
        const el = document.activeElement;
        if (!el) return false;
        const tag = el.tagName.toLowerCase();
        // Input, textarea, select, atau contentEditable elements
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
        if (el.isContentEditable) return true;
        // Juga cek jika fokus ada di dalam jarvis overlay
        if (el.closest && el.closest('#jarvis-overlay')) return true;
        return false;
    }

    window.addEventListener('keydown', function(e) {
        // 🔥 FIX: Jika sedang ngetik di HTML input → JANGAN kirim ke ImGui
        if (isHtmlInputFocused()) {
            // Hanya bypass ImGui, biarkan HTML handle sendiri
            return;
        }

        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        if (!Module._wasm_send_key) return;
        
        if (e.keyCode === 8 || e.keyCode === 9) e.preventDefault(); 
        Module.ccall('wasm_send_key', null, ['number', 'number'], [e.keyCode, 1]);
        if (e.ctrlKey) Module.ccall('wasm_send_key', null, ['number', 'number'], [17, 1]); 
    });

    window.addEventListener('keyup', function(e) {
        // 🔥 FIX: Jika sedang ngetik di HTML input → JANGAN kirim ke ImGui
        if (isHtmlInputFocused()) {
            return;
        }

        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap

        if (!Module.ccall || !Module._wasm_send_key) return;
        
        Module.ccall('wasm_send_key', null, ['number', 'number'], [e.keyCode, 0]);
        if (e.keyCode === 17) Module.ccall('wasm_send_key', null, ['number', 'number'], [17, 0]); 
    });

</script>
