<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Trade View - SaaS Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-color: #0b0e11; color: #fff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at top right, #003366 0%, #0b0e11 50%);
        }
        
        /* Glassmorphism Container */
        .auth-container {
            background: rgba(20, 25, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 16px;
            width: 100%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .auth-container h1 {
            font-size: 24px; font-weight: 700; margin-bottom: 5px; color: #00FFAA;
        }
        .auth-container p.subtitle {
            font-size: 13px; color: #88929b; margin-bottom: 30px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label {
            display: block; font-size: 12px; color: #88929b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #2a3138; border-radius: 8px;
            color: white; font-size: 14px;
            outline: none; transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: #00FFAA;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.2);
        }

        .btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #00FFAA 0%, #0088ff 100%);
            border: none; border-radius: 8px;
            color: #000; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 170, 0.3);
        }
        .btn-primary:disabled {
            background: #444; color: #888; cursor: not-allowed; transform: none; box-shadow: none;
        }

        .toggle-mode {
            margin-top: 20px; font-size: 13px; color: #88929b; cursor: pointer;
        }
        .toggle-mode span { color: #00FFAA; font-weight: 600; }
        .toggle-mode:hover span { text-decoration: underline; }

        #error-msg {
            color: #ff4444; font-size: 13px; margin-top: 15px; min-height: 20px;
        }

        /* Hiasan Background */
        .bg-shape {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: 1;
        }
        .shape1 { width: 300px; height: 300px; background: rgba(0, 255, 170, 0.15); top: -100px; left: -100px; }
        .shape2 { width: 400px; height: 400px; background: rgba(0, 136, 255, 0.15); bottom: -150px; right: -150px; }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="auth-container">
        <h1 id="title">Selamat Datang</h1>
        <p class="subtitle" id="subtitle">Masuk untuk mengakses MarketTradeWeb</p>

        <form id="auth-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="nama@email.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Minimal 6 karakter">
            </div>
            <button type="submit" class="btn-primary" id="btn-submit">Masuk ke Platform</button>
        </form>

        <p id="error-msg"></p>
        <div class="toggle-mode" id="toggle-btn">Belum punya akun? <span>Daftar di sini</span></div>
    </div>

    <!-- FIREBASE SDK (Module Version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // 🔥 FIREBASE CONFIG DARI PAK AMIN
        const firebaseConfig = {
            apiKey: "AIzaSyAx20fXyKEgOYLXaKqV6N2luncaviY2DSs",
            authDomain: "markettradeweb.firebaseapp.com",
            projectId: "markettradeweb",
            storageBucket: "markettradeweb.firebasestorage.app",
            messagingSenderId: "125606231501",
            appId: "1:125606231501:web:71caa059ad9dbd37acd884"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const btnSubmit = document.getElementById('btn-submit');
        const toggleBtn = document.getElementById('toggle-btn');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const errorMsg = document.getElementById('error-msg');

        let isRegister = false;

        // Cek jika user sudah pernah login sebelumnya (Auto-Login)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                btnSubmit.innerText = "Memasukkan Anda...";
                btnSubmit.disabled = true;
                // Lempar ke app.html
                window.location.href = "app.html";
            }
        });

        // Toggle antara Login dan Register
        toggleBtn.addEventListener('click', () => {
            isRegister = !isRegister;
            if (isRegister) {
                title.innerText = "Buat Akun Baru";
                subtitle.innerText = "Daftar untuk mencoba platform Trading 100% Gratis";
                btnSubmit.innerText = "Daftar Sekarang";
                toggleBtn.innerHTML = "Sudah punya akun? <span>Masuk di sini</span>";
            } else {
                title.innerText = "Selamat Datang";
                subtitle.innerText = "Masuk untuk mengakses MarketTradeWeb";
                btnSubmit.innerText = "Masuk ke Platform";
                toggleBtn.innerHTML = "Belum punya akun? <span>Daftar di sini</span>";
            }
            errorMsg.innerText = "";
        });

        // Handle Submit Form
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passInput.value;

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Memproses...";
            errorMsg.innerText = "";

            if (isRegister) {
                // DAFTAR
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        // Registrasi Sukses, Firebase akan otomatis trigger onAuthStateChanged
                    })
                    .catch((error) => {
                        errorMsg.innerText = error.message;
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "Daftar Sekarang";
                    });
            } else {
                // LOGIN
                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        // Login Sukses
                    })
                    .catch((error) => {
                        errorMsg.innerText = "Email atau Password salah!";
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "Masuk ke Platform";
                    });
            }
        });
    </script>
</body>
</html>
