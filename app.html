<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Market Trade View</title>

<style>
/* --- 1. RESET STANDAR BROWSER --- */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow: hidden; /* Anti Scroll */
    background-color: #000;
    font-family: 'Segoe UI', sans-serif;
    /* 🔥 PENTING: Matikan semua gesture bawaan browser (zoom/swipe back) */
    touch-action: none; 
    -webkit-user-select: none; /* Matikan blok teks */
    user-select: none;
}

/* --- 2. CANVAS STANDAR IMGUI WEB --- */
canvas.emscripten {
    position: absolute;
    top: 36px; left: 0;                /* 🔥 offset 36px ke bawah — di bawah header bar */
    width: 100%; height: calc(100% - 36px);
    border: 0 none;
    background-color: #000;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 1;
}

/* --- 👻 CLASS HANTU (RAHASIA TEMBUS PANDANG) --- */
/* Pakai class ini di div overlay (judul, fps, watermark) */
.overlay-ghost {
    pointer-events: none !important; /* Tembus sentuhan! */
}
/* Pakai class ini di TOMBOL HTML (Chat, Login) biar bisa diklik */
.overlay-interactive {
    pointer-events: auto !important; 
    cursor: pointer;
}

/* --- UI LOGIN (GATEWAY) --- */
#login-gateway {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9999; display: flex; overflow: hidden; 
    pointer-events: none; /* Container login tembus pandang */
}
/* Anak elemen login harus bisa diklik */
#login-gateway > * { pointer-events: auto; }

.gate {
    position: absolute; width: 50%; height: 100%;
    background: #111; border: 1px solid #222;
    transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
}
.gate-left { left: 0; border-right: 2px solid #0af; }
.gate-right { right: 0; border-left: 2px solid #0af; }

.gate-open .gate-left { transform: translateX(-100%); }
.gate-open .gate-right { transform: translateX(100%); }

#auth-container {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000; background: rgba(26, 26, 26, 0.95);
    padding: 40px; border-radius: 12px;
    width: 320px; border: 1px solid #333;
    color: white; text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.auth-fade-out { opacity: 0; transform: translate(-50%, -60%); pointer-events: none; }

h2 { margin-bottom: 25px; color: #0af; letter-spacing: 2px; font-size: 20px; }
input {
    width: 100%; padding: 12px; margin: 10px 0;
    background: #111; border: 1px solid #444; border-radius: 6px; color: white;
}
input:focus { border-color: #0af; outline: none; }
button {
    width: 100%; padding: 14px; margin-top: 15px;
    background: #0af; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
}
button:hover { background: #008ccb; }
.toggle-link { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; }
#auth-msg { color: #ff5555; font-size: 12px; margin-top: 10px; min-height: 15px; }

/* === APP HEADER BAR — Jarvis Dark Tech Style === */
#app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 36px;
    background: linear-gradient(180deg, #0a0a12 0%, #0f0f18 100%);
    border-bottom: 1px solid rgba(16, 185, 129, 0.25);
    display: flex;
    align-items: center;
    z-index: 9998;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    user-select: none;
    -webkit-user-select: none;
}

/* Pojok kiri: Nama App */
.app-header-brand {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px; height: 100%;
    font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
    white-space: nowrap; flex-shrink: 0;
    border-right: 1px solid rgba(16, 185, 129, 0.15);
}
.app-header-brand-icon {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    border-radius: 4px;
    border: 1px solid rgba(16, 185, 129, 0.3);
    flex-shrink: 0;
}
.app-header-brand-icon svg {
    width: 16px; height: 16px;
}
.app-header-brand-icon img {
    width: 18px; height: 18px;
    object-fit: contain;
}
.app-header-brand-text {
    background: linear-gradient(90deg, #10b981, #34d399, #10b981);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: brand-shimmer 4s linear infinite;
}
@keyframes brand-shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

/* Tengah: Ticker Berjalan */
.app-header-ticker {
    flex: 1; overflow: hidden; height: 100%;
    display: flex; align-items: center; position: relative;
    mask-image: linear-gradient(90deg, transparent 0%, #000 4%, #000 96%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 4%, #000 96%, transparent 100%);
}
.app-header-ticker-track {
    display: flex; align-items: center; gap: 28px;
    white-space: nowrap; padding-left: 100%;
    animation: ticker-scroll 40s linear infinite;
}
@keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
.ticker-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: 'Consolas', 'Monaco', monospace;
}
.ticker-symbol { color: #aaa; font-weight: 600; letter-spacing: 0.5px; }
.ticker-price  { color: #e0e0e0; }
.ticker-up     { color: #10b981; font-weight: 600; }
.ticker-down   { color: #ef4444; font-weight: 600; }
.ticker-sep    { color: rgba(255,255,255,0.1); }

/* Kanan: Tombol Fullscreen + Exit */
.app-header-controls {
    display: flex; align-items: center; gap: 4px;
    padding: 0 10px; height: 100%; flex-shrink: 0;
    border-left: 1px solid rgba(16, 185, 129, 0.15);
    /* 🔥 FIX: align center vertical supaya sejajar dengan ticker */
    align-self: center;
}
.header-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent;
    border-radius: 5px; cursor: pointer; color: #777;
    transition: all 0.15s ease; padding: 0;
    /* 🔥 FIX: margin-top 0, align center */
    margin: 0;
}
.header-btn:hover {
    background: rgba(16, 185, 129, 0.12);
    border-color: rgba(16, 185, 129, 0.3);
    color: #10b981;
}
.header-btn:active { transform: scale(0.92); }
.header-btn svg { width: 15px; height: 15px; }
.header-btn-exit:hover {
    background: rgba(239, 68, 68, 0.12);
    border-color: rgba(239, 68, 68, 0.3);
    color: #ef4444;
}

/* Mobile adjust */
@media (max-width: 768px) {
    .app-header-brand-text { font-size: 11px; }
    .app-header-brand { padding: 0 10px; }
    .ticker-item { font-size: 11px; }
}

</style>
</head>

<body>

<style>
/* === HACKER BOOT SCREEN === */
#boot-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 10000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-family: monospace; transition: opacity 0.8s ease;
}
.cyber-grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
        linear-gradient(rgba(0, 255, 170, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 170, 0.1) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -1; opacity: 0.3;
}
.scanline {
    position: absolute; top: 0; left: 0; width: 100%; height: 10px;
    background: rgba(0, 255, 170, 0.3); opacity: 0.5;
    animation: scan 3s linear infinite; z-index: -1;
}
@keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

.hacker-text { color: #00ffaa; font-size: 18px; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,255,170,0.5); text-align: center; }
.error-text { color: #ff0055 !important; text-shadow: 0 0 10px rgba(255,0,85,0.5) !important; }

.progress-box {
    width: 300px; height: 15px; border: 2px solid #00ffaa;
    position: relative; box-shadow: 0 0 10px rgba(0,255,170,0.3);
}

    width: 0%; height: 100%; background: #00ffaa;
    box-shadow: 0 0 15px #00ffaa; transition: width 0.1s ease;
}
.progress-pct { margin-top: 15px; color: #00ffaa; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px rgba(0,255,170,0.5); }
</style>

<div id="boot-overlay">
    <div class="cyber-grid"></div>
    <div class="scanline"></div>
    <div class="hacker-text" id="boot-status">INITIALIZING SYSTEM...</div>
    <div class="progress-box">
        <div class="progress-bar" id="boot-bar"></div>
    </div>
    <div class="progress-pct" id="boot-pct">0%</div>
</div>

    <!-- Firebase Gatekeeper Active -->
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<script>
    var Module = {
        locateFile: function(path, prefix) {
            if (path.endsWith('.data') || path.endsWith('.wasm')) return 'dist/' + path;
            return prefix + path;
        },
        preRun: [],
        postRun: [],
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. Reload page.'); e.preventDefault(); }, false);
            return canvas;
        })(),
        setStatus: function(text) {
            if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
            if (text === Module.setStatus.last.text) return;
            
            var statusEl = document.getElementById('boot-status');
            var barEl = document.getElementById('boot-bar');
            var pctEl = document.getElementById('boot-pct');
            
            if (!statusEl) return;
            
            // Format Emscripten: "Downloading data... (1234/5678)"
            var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
            if (m) {
                var pct = Math.round((parseInt(m[2]) / parseInt(m[4])) * 100);
                statusEl.innerText = "DOWNLOADING SECURE DATA...";
                barEl.style.width = pct + "%";
                pctEl.innerText = pct + "%";
            } else {
                statusEl.innerText = text ? text.toUpperCase() : "SYSTEM READY";
                // Emscripten passes "" or "Running..." when it finishes
                if(!text || text.toLowerCase() === "running...") { 
                    barEl.style.width = "100%"; pctEl.innerText = "100%"; 
                    Module.hideBootScreen();
                }
            }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            Module.setStatus(left ? 'PREPARING MODULES... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'ALL DOWNLOADS COMPLETE.');
        },
        hideBootScreen: function() {
            if (Module._bootScreenHidden) return;
            Module._bootScreenHidden = true;
            console.log("[WASM] Engine Loaded & Boot Screen Hidden.");
            
            var statusEl = document.getElementById('boot-status');
            if (statusEl) {
                statusEl.innerText = "ENGINE BOOTED SUCCESSFULLY.";
                document.getElementById('boot-bar').style.width = "100%";
                document.getElementById('boot-pct').innerText = "100%";
            }
            
            setTimeout(function() {
                var overlay = document.getElementById('boot-overlay');
                if(overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(function(){ overlay.style.display = 'none'; }, 800);
                }
                
                var cv = document.getElementById('canvas');
                if (cv) { cv.focus(); }

                if (Module._wasm_on_login_success) Module._wasm_on_login_success();
                if (typeof connectWS === 'function') connectWS();
            }, 500);
        },
        onRuntimeInitialized: function() { 
            Module.hideBootScreen();
        },
        postRun: [
            function() {
                Module.hideBootScreen();
            }
        ]
    };
    Module.setStatus('ESTABLISHING CONNECTION...');
    
    window.onerror = function(event) {
        var statusEl = document.getElementById('boot-status');
        if(statusEl) {
            statusEl.innerText = "CRITICAL ERROR: HARDWARE NOT SUPPORTED OR CONNECTION FAILED.";
            statusEl.classList.add('error-text');
            var bar = document.getElementById('boot-bar');
            if (bar) { bar.style.background = '#ff0055'; bar.style.boxShadow = '0 0 15px #ff0055'; }
            var pct = document.getElementById('boot-pct');
            if (pct) { pct.innerText = "ERR"; pct.classList.add('error-text'); }
        }
        console.error("Window Error: " + event); 
    };
</script>

<script>
    // --- FIREBASE GATEKEEPER ---
    // Diisi di script type="module" di bawah
    // --- BRIDGE WASM ---
    window.notifyWASM_candle = function(o,h,l,c,t,v){
        if (Module.ccall) Module.ccall("wasm_push_candle", null, ["number","number","number","number","number","number"], [o,h,l,c,t,v]);
    };
    window.notifyWASM_tick = function(price,time){
        if (Module.ccall) Module.ccall("wasm_push_tick", null, ["number","number"], [price,time]);
    };
    
    // ====================================================================
    // 🖱️ & 📱 SUPER NATIVE INPUT HANDLING (JARI = MOUSE)
    // ====================================================================
    var canvas = document.getElementById("canvas");
    var isTouching = false; 
    var lastTouchX = null, lastTouchY = null, lastPinchDist = null;

    function getScale() {
        var rect = canvas.getBoundingClientRect();
        return { x: canvas.width / rect.width, y: canvas.height / rect.height };
    }
    function getPinchDist(t1, t2) {
        return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }

    // 🛡️ GUARD: cek apakah WASM benar-benar siap terima input.
    // Module.ccall ada SEBELUM main() selesai, jadi cek Module.calledRun
    // untuk pastikan main() sudah jalan (ImGui::CreateContext() sudah call).
    // Tanpa ini, mouse event masuk sebelum ImGui context ready → crash.
    function wasmInputReady() {
        return (typeof Module !== 'undefined' &&
                Module.ccall &&
                Module.calledRun === true);
    }

    // --- 1. MOUSE (PC) ---
    // Kita cegat Mouse Event jika user sedang pakai Touchscreen (supaya tidak double click)
    canvas.addEventListener('mousemove', function(e) {
        if (isTouching) return; 
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        var rect = canvas.getBoundingClientRect(); var s = getScale();
        Module.ccall('wasm_mouse_move', null, ['number', 'number'], [(e.clientX - rect.left)*s.x, (e.clientY - rect.top)*s.y]);
    });
    canvas.addEventListener('mousedown', function(e) {
        if (isTouching) { e.preventDefault(); return; } // 🔥 Stop Ghost Click
        if (!wasmInputReady()) { e.preventDefault(); return; }  // 🛡️ skip kalau WASM belum siap
        Module.ccall('wasm_mouse_click', null, ['number', 'number'], [e.button, 1]); 
    }, {passive: false});
    canvas.addEventListener('mouseup', function(e) {
        if (isTouching) { e.preventDefault(); return; } // 🔥 Stop Ghost Click
        if (!wasmInputReady()) { e.preventDefault(); return; }  // 🛡️ skip kalau WASM belum siap
        Module.ccall('wasm_mouse_click', null, ['number', 'number'], [e.button, 0]); 
    }, {passive: false});
    canvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        Module.ccall('wasm_mouse_wheel', null, ['number'], [Math.sign(e.deltaY) * -1]);
    }, {passive: false});
    canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);

    // --- 2. TOUCH (JARI -> MOUSE SIMULATOR) ---
    // Ini rahasianya agar drawing berfungsi saat disentuh
    
    canvas.addEventListener('touchstart', function(e) {
        if(e.cancelable) e.preventDefault(); // 🔥 Matikan scroll/zoom browser
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        isTouching = true;
        
        var rect = canvas.getBoundingClientRect(); var s = getScale();

        if (e.touches.length === 1) {
            // SINGLE TOUCH (Simulasi Mouse Kiri Klik)
            var touch = e.touches[0];
            var x = (touch.clientX - rect.left) * s.x;
            var y = (touch.clientY - rect.top) * s.y;
            
            lastTouchX = touch.clientX; lastTouchY = touch.clientY; lastPinchDist = null;

            // 🔥 LANGKAH 1: Teleport Kursor Mouse Virtual ke posisi jari DULUAN
            Module.ccall('wasm_mouse_move', null, ['number', 'number'], [x, y]);
            // 🔥 LANGKAH 2: Baru tekan tombol "Klik Kiri" (1 = Down)
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 1]); 
            
            // Opsional: Kirim raw touch start buat logic lain
            Module.ccall('wasm_notify_touch_start', null, ['number', 'number'], [x, y]);
        } else if (e.touches.length === 2) {
            // DUAL TOUCH (Zoom / Pan - Lepas Klik Mouse)
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 0]);
            lastPinchDist = getPinchDist(e.touches[0], e.touches[1]);
            lastTouchX = null; lastTouchY = null;
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', function(e) {
        if (e.cancelable) e.preventDefault(); 
        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        var rect = canvas.getBoundingClientRect(); var s = getScale();

        if (e.touches.length === 2 && lastPinchDist !== null) {
            // --- ZOOM LOGIC ---
            var currentDist = getPinchDist(e.touches[0], e.touches[1]);
            var deltaZoom = (currentDist - lastPinchDist) * s.x;
            Module.ccall('wasm_zoom_chart', null, ['number'], [deltaZoom]);
            lastPinchDist = currentDist; 
        } 
        else if (e.touches.length === 1 && lastTouchX !== null) {
            // --- DRAG / DRAW LOGIC ---
            var touch = e.touches[0];
            var x = (touch.clientX - rect.left) * s.x;
            var y = (touch.clientY - rect.top) * s.y;
            
            // Hitung delta untuk Pan Chart
            var deltaX = touch.clientX - lastTouchX; 
            var deltaY = touch.clientY - lastTouchY;

            // 1. Update posisi mouse virtual (PENTING BUAT DRAWING TOOLS)
            Module.ccall('wasm_mouse_move', null, ['number', 'number'], [x, y]);
            
            // 2. Kirim sinyal Pan (Geser Chart) 
            // Catatan: Di main.cpp, pastikan logika "Jika sedang Drawing, Jangan Pan Chart"
            Module.ccall('wasm_pan_chart_pixels', null, ['number', 'number'], [deltaX, deltaY]);
            lastTouchX = touch.clientX; lastTouchY = touch.clientY;
        }
    }, {passive: false});

    canvas.addEventListener('touchend', function(e) {
        if (e.cancelable) e.preventDefault();
        if (!wasmInputReady()) { isTouching = false; return; }  // 🛡️ skip kalau WASM belum siap
        
        if (e.touches.length < 2) lastPinchDist = null;
        
        if (e.touches.length === 0) { 
            lastTouchX = null; lastTouchY = null;

            // 🔥 FIX: Langsung reset semua state touch di C++ tanpa delay
            // Dulu pakai setTimeout 300ms → g_isTouchActive nyangkut di true
            // Sekarang langsung reset → scale Y tidak "ingat" state lama
            // Reset klik mouse
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 0]);
            // Reset semua touch state (g_isTouchActive, isResizingY, deltas, dll)
            Module.ccall('wasm_notify_touch_end', null, [], []);

            // Reset flag JS juga langsung (tanpa delay)
            isTouching = false;
        } else {
            // Masih ada jari lain di layar → cukup lepas mouse click
            Module.ccall('wasm_mouse_click', null, ['number', 'number'], [0, 0]);
        }
    }, {passive: false});

   // --- KEYBOARD HANDLING ---
    // FIX: Jika user sedang ngetik di HTML input/textarea (misal: jarvis chat),
    // JANGAN kirim key ke ImGui dan JANGAN preventDefault.
    // Biarkan key event sampai ke HTML input secara normal.
    function isHtmlInputFocused() {
        const el = document.activeElement;
        if (!el) return false;
        const tag = el.tagName.toLowerCase();
        // Input, textarea, select, atau contentEditable elements
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
        if (el.isContentEditable) return true;
        // Juga cek jika fokus ada di dalam jarvis overlay
        if (el.closest && el.closest('#jarvis-overlay')) return true;
        return false;
    }

    window.addEventListener('keydown', function(e) {
        // 🔥 FIX: Jika sedang ngetik di HTML input → JANGAN kirim ke ImGui
        if (isHtmlInputFocused()) {
            // Hanya bypass ImGui, biarkan HTML handle sendiri
            return;
        }

        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap
        if (!Module._wasm_send_key) return;
        
        if (e.keyCode === 8 || e.keyCode === 9) e.preventDefault(); 
        Module.ccall('wasm_send_key', null, ['number', 'number'], [e.keyCode, 1]);
        if (e.ctrlKey) Module.ccall('wasm_send_key', null, ['number', 'number'], [17, 1]); 
    });

    window.addEventListener('keyup', function(e) {
        // 🔥 FIX: Jika sedang ngetik di HTML input → JANGAN kirim ke ImGui
        if (isHtmlInputFocused()) {
            return;
        }

        if (!wasmInputReady()) return;  // 🛡️ skip kalau WASM belum siap

        if (!Module.ccall || !Module._wasm_send_key) return;
        
        Module.ccall('wasm_send_key', null, ['number', 'number'], [e.keyCode, 0]);
        if (e.keyCode === 17) Module.ccall('wasm_send_key', null, ['number', 'number'], [17, 0]); 
    });

    // ====================================================================
    // 📊 APP HEADER BAR — Fullscreen + Exit + Ticker Berjalan
    // ====================================================================

    // ── Tombol Fullscreen ──
    document.getElementById('btn-fullscreen').addEventListener('click', function() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function(e) {
                console.warn('[HEADER] Fullscreen failed:', e);
            });
        } else {
            document.exitFullscreen();
        }
    });

    // ── Tombol Exit App ──
    document.getElementById('btn-exit-app').addEventListener('click', function() {
        if (confirm('Keluar dari aplikasi?')) {
            if (window.logoutFirebase) {
                window.logoutFirebase();
            } else {
                window.location.href = 'index.html';
            }
        }
    });

    // ── Ticker Data (default — akan di-update real-time dari websocket) ──
    // Symbol yang ditampilkan di ticker (urutan)
    var tickerSymbols = ['XAUUSD', 'BTCUSDT', 'ETHUSDT', 'EURUSD', 'GBPUSD', 'XAGUSD', 'WTIUSD', 'SOLUSDT'];
    // Default value (akan di-update dari window.g_tickerPrices)
    var tickerData = {};
    tickerSymbols.forEach(function(s) {
        tickerData[s] = { sym: s, price: '---', change: '+0.00%', up: true };
    });

    function formatPrice(sym, price) {
        if (price === null || price === undefined || isNaN(price)) return '---';
        // Format berdasarkan jenis symbol
        if (sym === 'XAUUSD' || sym === 'XAGUSD') return price.toFixed(2);
        if (sym === 'WTIUSD') return price.toFixed(2);
        if (sym === 'EURUSD' || sym === 'GBPUSD') return price.toFixed(4);
        if (sym.includes('USDT') || sym.includes('USD')) {
            // Crypto: format ribuan
            if (price > 1000) return price.toLocaleString('en-US', { maximumFractionDigits: 0 });
            return price.toFixed(2);
        }
        return price.toString();
    }

    function renderTicker() {
        var track = document.getElementById('ticker-track');
        if (!track) return;
        var items = tickerSymbols.map(function(sym) {
            var d = tickerData[sym] || { sym: sym, price: '---', change: '+0.00%', up: true };
            return '<span class="ticker-item">' +
                '<span class="ticker-symbol">' + d.sym + '</span>' +
                '<span class="ticker-price">' + d.price + '</span>' +
                '<span class="' + (d.up ? 'ticker-up' : 'ticker-down') + '">' + d.change + '</span>' +
                '</span><span class="ticker-sep">|</span>';
        }).join('');
        track.innerHTML = items;
    }

    // 🔥 Update ticker dari window.g_tickerPrices (diisi oleh websocket.js sendTickToWasm)
    function updateTickerFromWebsocket() {
        if (!window.g_tickerPrices) return;
        var changed = false;
        for (var i = 0; i < tickerSymbols.length; i++) {
            var sym = tickerSymbols[i];
            var data = window.g_tickerPrices[sym];
            if (data && data.price) {
                var prevPrice = data.prevPrice || data.price;
                var changePercent = 0;
                if (prevPrice > 0) {
                    changePercent = ((data.price - prevPrice) / prevPrice) * 100;
                }
                var newPrice = formatPrice(sym, data.price);
                if (tickerData[sym].price !== newPrice) {
                    tickerData[sym].price = newPrice;
                    tickerData[sym].change = (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '%';
                    tickerData[sym].up = changePercent >= 0;
                    changed = true;
                }
            }
        }
        if (changed) renderTicker();
    }

    // Polling update setiap 500ms (cukup cepat untuk ticker, tidak berat)
    setInterval(updateTickerFromWebsocket, 500);

    // Hook manual (kalau websocket mau push langsung)
    window.updateTickerPrice = function(symbol, price, changePercent) {
        if (!tickerData[symbol]) return;
        tickerData[symbol].price = formatPrice(symbol, price);
        tickerData[symbol].change = (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '%';
        tickerData[symbol].up = changePercent >= 0;
        renderTicker();
    };

    // ── Auto-detect logo.png di folder assets ──
    // Kalau ada, pakai PNG. Kalau tidak, biarkan SVG candlestick fallback.
    function checkLogoImage() {
        var logoEl = document.getElementById('app-logo');
        if (!logoEl) return;
        var testImg = new Image();
        testImg.onload = function() {
            // logo.png ada → ganti SVG dengan <img>
            logoEl.innerHTML = '<img src="assets/logo.png" alt="Logo">';
        };
        testImg.onerror = function() {
            // logo.png tidak ada → biarkan SVG candlestick (sudah default)
            console.log('[HEADER] assets/logo.png not found, using SVG candlestick fallback');
        };
        testImg.src = 'assets/logo.png';
    }

    // Init ticker + logo check
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            renderTicker();
            checkLogoImage();
        });
    } else {
        renderTicker();
        checkLogoImage();
    }

</script>
